<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

  <h2>Student Enrollment Request</h2>

  <!-- Student Name -->

  <div>

    <label>Student Name</label><br>

    <input
      type="text"
      name="studentName"
      [(ngModel)]="student.studentName"
      #nameCtrl="ngModel"
      required
      minlength="3">

    <div *ngIf="nameCtrl.touched">

      <small *ngIf="nameCtrl.errors?.['required']">
        Name is required
      </small>

      <small *ngIf="nameCtrl.errors?.['minlength']">
        Name must be at least 3 characters
      </small>

    </div>

  </div>

  <br>

  <!-- Email -->

  <div>

    <label>Email</label><br>

    <input
      type="email"
      name="studentEmail"
      [(ngModel)]="student.studentEmail"
      #emailCtrl="ngModel"
      required
      email>

    <div *ngIf="emailCtrl.touched">

      <small *ngIf="emailCtrl.errors?.['required']">
        Email is required
      </small>

      <small *ngIf="emailCtrl.errors?.['email']">
        Enter a valid email
      </small>

    </div>

  </div>

  <br>

  <!-- Course ID -->

  <div>

    <label>Course ID</label><br>

    <input
      type="number"
      name="courseId"
      [(ngModel)]="student.courseId"
      #courseCtrl="ngModel"
      required>

    <div *ngIf="courseCtrl.touched">

      <small *ngIf="courseCtrl.errors?.['required']">
        Course ID is required
      </small>

    </div>

  </div>

  <br>

  <!-- Semester -->

  <div>

    <label>Preferred Semester</label><br>

    <select
      name="preferredSemester"
      [(ngModel)]="student.preferredSemester">

      <option value="">Select Semester</option>
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>

    </select>

  </div>

  <br>

  <!-- Terms -->

  <div>

    <input
      type="checkbox"
      name="agreeToTerms"
      [(ngModel)]="student.agreeToTerms"
      #termsCtrl="ngModel"
      required>

    <label>I agree to the Terms and Conditions</label>

    <div *ngIf="termsCtrl.touched">

      <small *ngIf="termsCtrl.errors?.['required']">
        You must accept the terms.
      </small>

    </div>

  </div>

  <br>

  <!-- Buttons -->

  <button
    type="submit"
    [disabled]="enrollForm.invalid">

    Submit

  </button>

  <button
    type="button"
    (click)="enrollForm.resetForm(); submitted=false">

    Reset

  </button>

  <br><br>

  <!-- Success Message -->

  <div *ngIf="submitted">

    <strong>
      Enrollment request submitted successfully!
    </strong>

  </div>

</form>
