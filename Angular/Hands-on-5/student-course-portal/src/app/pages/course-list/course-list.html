<h2>Course List</h2>

<p *ngIf="isLoading">
    Loading courses...
</p>

<div *ngIf="!isLoading">

    <div *ngIf="courses.length > 0; else noCourses">

        <app-course-card

            *ngFor="let course of courses;
                     let i = index;
                     trackBy: trackByCourseId"

            [course]="course"

            (enrollRequested)="onEnroll($event)">

        </app-course-card>

    </div>

</div>

<ng-template #noCourses>

    <p>No courses available.</p>

</ng-template>

<p *ngIf="selectedCourseId">

    Selected Course ID :

    {{ selectedCourseId }}

</p>
