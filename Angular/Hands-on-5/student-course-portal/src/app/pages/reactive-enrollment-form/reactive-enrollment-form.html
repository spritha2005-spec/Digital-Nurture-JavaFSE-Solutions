<form
  [formGroup]="enrollForm"
  (ngSubmit)="onSubmit()">

<h2>Reactive Enrollment Form</h2>

<!-- Student Name -->

<label>Student Name</label><br>

<input
type="text"
formControlName="studentName">

<div
*ngIf="
enrollForm.get('studentName')?.touched &&
enrollForm.get('studentName')?.errors?.['required']">

Name is required.

</div>

<div
*ngIf="
enrollForm.get('studentName')?.touched &&
enrollForm.get('studentName')?.errors?.['minlength']">

Name must be at least 3 characters.

</div>

<br>

<!-- Email -->

<label>Email</label><br>

<input
type="email"
formControlName="studentEmail">

<div
*ngIf="
enrollForm.get('studentEmail')?.pending">

Checking email...

</div>

<div
*ngIf="
enrollForm.get('studentEmail')?.errors?.['emailTaken']">

Email already taken.

</div>

<br>

<!-- Course ID -->

<label>Course ID</label><br>

<input
type="text"
formControlName="courseId">

<div
*ngIf="
enrollForm.get('courseId')?.errors?.['noCourseCode']">

Course code starting with XX is not allowed.

</div>

<br>

<!-- Semester -->

<label>Preferred Semester</label><br>

<select
formControlName="preferredSemester">

<option value="Odd">Odd</option>
<option value="Even">Even</option>

</select>

<br><br>

<!-- Checkbox -->

<input
type="checkbox"
formControlName="agreeToTerms">

I agree to Terms and Conditions

<br><br>

<!-- FormArray -->

<h3>Additional Courses</h3>

<button
type="button"
(click)="addCourse()">

Add Another Course

</button>

<br><br>

<div
*ngFor="
let ctrl of additionalCourses.controls;
let i = index">

<input
[formControl]="$any(ctrl)">

<button
type="button"
(click)="removeCourse(i)">

Remove

</button>

</div>

<br>

<button
type="submit"
[disabled]="enrollForm.invalid">

Submit

</button>

</form>
